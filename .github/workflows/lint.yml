name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check (JSDoc contracts)
        run: npm run typecheck

      - name: Lint regression fixtures
        run: npm run test:lint

      - name: WASM unit tests
        run: npm run test:unit
